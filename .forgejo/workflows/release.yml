name: Build & Release ElegantChart

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install terser --save-dev

      - name: Create dist directory
        run: mkdir -p dist

      - name: Minify JavaScript files
        run: |
          npx terser src/websocket-manager.js \
            -o dist/websocket-manager.js \
            -c -m

          npx terser src/editor.js \
            -o dist/editor.js \
            -c -m

          npx terser src/elegant-chart-card.js \
            -o dist/elegant-chart-card.js \
            -c -m

      - name: Create Release
        uses: gitea/gitea-release-action@v1
        with:
          files: |
            dist/elegant-chart-card.js
            dist/websocket-manager.js
            dist/editor.js
            manifest.json
            README.md
